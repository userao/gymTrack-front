@let withExercises = withExercises$ | async;

<div>
  <p>{{template.name}}</p>
  @if(withExercises) {
    @for (exerciseSets of withExercises.templateExercises; track $index) {
      <ul>
        <li>
          <p>{{exerciseSets.exercise.name}}</p>
          @for (set of exerciseSets.sets; track $index) {
            <p>{{set.weight}}kg x {{set.reps}}reps</p>
          }
        </li>
      </ul>
    }
  }
</div>
