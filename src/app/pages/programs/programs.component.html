@let groups = groupsSubject$ | async;

<div class="font-inter">
  <h1 class="page-header">Мои программы</h1>
  <div class="content-wrapper">
    <button matButton="filled" class="m-5" (click)="handleCreateProgram()">Создать программу<mat-icon>add</mat-icon></button>

    @if(groups) {
    @for (group of groups; track $index) {
    @if(group.parentId === null) {
    <app-group [group]="group" />
    }
    }
    }
  </div>
</div>
